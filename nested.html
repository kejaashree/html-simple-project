<!DOCTYPE html>
<html>
<head>
    <title>Colorful Nested List</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            text-align: center;
        }

        h2{
            text-align: center;
            color: #2c3e50;
        }

        /* Main Ordered List */
        ol{
            background-color: #ffeaa7;
            padding: 20px;
            width: 300px;
            border-radius: 10px;
            text-align: center;
        }

        /* First level list items */
        ol > li{
            color: #d63031;
            font-weight: bold;
            margin-bottom: 10px;
        }

        /* Unordered list */
        ul{
            background-color: #81ecec;
            padding: 10px;
            border-radius: 8px;
            margin-top: 5px;
        }

        /* Second level items */
        ul li{
            color: #2d3436;
        }

        /* Deep nested ordered list */
        ul ol{
            background-color: #fab1a0;
            margin-top: 5px;
            padding: 8px;
            border-radius: 6px;
        }

        ul ol li{
            color: #6c5ce7;
        }

    </style>
</head>


<body>
